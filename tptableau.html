<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Tableaux</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Conservation de ta rotation spécifique */
        .rotate-oblique {
            display: inline-block;
            transform: rotate(-45deg);
        }
    </style>
</head>
<body class="bg-light py-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                
                <div class="card shadow-sm p-4 bg-white">
                    <table class="table table-bordered border-dark text-center align-middle mb-0">
                        <caption class="caption-top text-center fw-bold text-secondary mb-2">Tableau N°1</caption>
                        <tbody>
                            <tr>
                                <td colspan="3" class="fw-bold text-primary">ENEAM</td>
                            </tr>
                            <tr>
                                <td class="bg-primary text-white" rowspan="2">
                                    <span class="rotate-oblique">IG1-B</span>
                                </td>
                                <td colspan="2">A</td>
                            </tr>
                            <tr>
                                <td>B</td>
                                <td>C</td>
                            </tr>
                            <tr>
                                <td>EPAC</td>
                                <td colspan="2">
                                    <span class="rotate-oblique">Programmation</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
