<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Style personnalisé pour le logo et la carte */
        .logo-img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border: 3px solid #0d6efd; /* Bordure bleue Bootstrap */
            border-radius: 50%;
        }
        .custom-card {
            max-width: 550px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card custom-card p-5 text-center border-light-subtle">
        
        <div class="mb-4">
            <img src="profile.png" alt="Logo" class="logo-img">
        </div>

        <div class="card-body p-0">
            <h1 class="text-primary fw-semibold mb-4">Bienvenue !</h1>
            <p class="card-text text-muted fs-5 lh-base">
                Nous sommes ravis de vous accueillir sur notre site. Installez-vous confortablement et bonne visite !
            </p>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
